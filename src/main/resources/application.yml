server:
  port: 18080

spring:
  application:
    name: ai-factory-orchestrator
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/heinu?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true

github:
  webhook:
    secret: ${GITHUB_WEBHOOK_SECRET:}
    verify-signature: ${GITHUB_WEBHOOK_VERIFY_SIGNATURE:false}

logging:
  level:
    com.company.aifactory: info
